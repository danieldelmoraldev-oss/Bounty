services:
  - type: web
    name: bounty-server
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @bounty/server build
    startCommand: node apps/server/dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 24.11.1
      - key: PORT
        value: 4000
      - key: DATA_MODE
        value: live
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
